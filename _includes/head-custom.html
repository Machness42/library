<!-- Fix math -->
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
  /* This ensures your math blocks don't get flipped awkwardly by the Hebrew RTL layout */
  .mjx-chtml { direction: ltr !important; display: inline-block; }
  mjx-container[display="true"] { direction: ltr !important; }
</style>

<!-- Fix RTL -->
<style>
  /* Force the whole page to be Right-to-Left for Hebrew */
  body {
    direction: rtl;
    text-align: right;
  }

  /* Keep Math blocks Left-to-Right so equations don't reverse */
  .mjx-chtml, mjx-container {
    direction: ltr !important;
    text-align: left;
    display: inline-block;
  }
</style>
